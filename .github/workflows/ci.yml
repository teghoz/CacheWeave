name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'           # publish workflow handles tags
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore dependencies
        run: dotnet restore CacheWeave.slnx

      - name: Build
        run: dotnet build CacheWeave.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CacheWeave.slnx --configuration Release --no-build --verbosity normal
